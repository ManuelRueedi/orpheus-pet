<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Orpheus Pet — Controls</title>
  </head>
  <body class="panel-body">
    <!-- Speech bubble / control panel. This is its own window; the pet shows,
         hides, and positions it in the free space beside the witch. -->
    <section id="panel" class="panel" aria-label="Pet controls">
      <!-- Status: dot + label (or the equalizer while reading) + minimize -->
      <div id="status" class="status state-thinking" aria-live="polite">
        <span class="st-dot"></span>
        <span id="statusText" class="st-text">Starting…</span>
        <span class="st-eq" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
        <button id="hide" class="hide-btn" title="Hide to tray">–</button>
      </div>

      <!-- The model target is one choice: language + size stay together and
           remain editable on first run until setup actually starts. -->
      <div id="pickerRows" class="panel-row model-row">
        <select id="lang" title="Language" aria-label="Language"></select>
        <select id="quality" aria-label="Model size" title="Model size · VRAM shown is for full-GPU (optimal) performance — smaller runs on lower-end GPUs"></select>
      </div>

      <!-- Middle zone: normally the text box + Speak. Setup, model changes,
           and progress each replace it with only the controls needed now. -->
      <textarea id="text" rows="2" placeholder="Tell the witch what to say…  ·  Ctrl+Enter" style="display: none"></textarea>
      <div class="panel-row" id="speakRow" style="display: none">
        <button id="speak" class="btn primary">Speak</button>
      </div>

      <!-- First-run / recovery state: one short fact and one clear action. -->
      <div class="setup-block" id="setupRow" style="display: none" role="status">
        <span id="setupMsg" class="setup-msg">Checking the speech engine…</span>
        <div class="panel-row setup-actions">
          <button id="setupAction" class="btn primary">Check again</button>
        </div>
      </div>

      <div class="confirm-block" id="confirmRow" style="display: none">
        <span id="confirmMsg" class="confirm-msg" aria-live="polite" aria-atomic="true"></span>
        <div class="panel-row confirm-actions">
          <button id="confirmCancel" class="btn">Cancel</button>
          <button id="confirmDl" class="btn primary">Download</button>
        </div>
      </div>

      <div class="panel-row dl-row" id="dlRow" style="display: none">
        <div class="dl-info">
          <span id="dlLabel">Downloading…</span>
          <div id="dlBar" class="dl-bar" role="progressbar" aria-label="Speech setup progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="dlFill"></div></div>
        </div>
        <button id="stopDl" class="btn">Stop</button>
      </div>

      <div class="panel-row hotkey-row" id="utilityRow" style="display: none">
        <select id="voice" title="Voice" aria-label="Voice"></select>
        <button id="hotkey" class="btn hk-btn" title="Read-aloud hotkey — click, then press a shortcut">…</button>
      </div>
    </section>
    <script type="module" src="/src/panel.js"></script>
  </body>
</html>
