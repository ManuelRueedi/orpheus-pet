<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Orpheus Pet — Controls</title>
  </head>
  <body class="panel-body">
    <!-- Speech bubble / control panel. This is its own window; the pet shows,
         hides, and positions it in the free space beside the witch. -->
    <section id="panel" class="panel" aria-label="Pet controls">
      <!-- Status: dot + label (or the equalizer while reading) + minimize -->
      <div id="status" class="status state-thinking">
        <span class="st-dot"></span>
        <span id="statusText" class="st-text">Starting…</span>
        <span class="st-eq" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
        <button id="hide" class="hide-btn" title="Hide to tray">–</button>
      </div>

      <!-- Language + voice pickers (always visible). -->
      <div id="pickerRows" class="panel-row">
        <select id="lang" title="Language"></select>
        <select id="voice" title="Voice"></select>
      </div>

      <!-- Middle zone: normally the text box + Speak. The download confirm and
           progress UIs take over this space (message on top, actions below). -->
      <textarea id="text" rows="2" placeholder="Tell the witch what to say…  ·  Ctrl+Enter"></textarea>
      <div class="panel-row" id="speakRow">
        <button id="speak" class="btn primary">Speak</button>
      </div>

      <div class="confirm-block" id="confirmRow" style="display: none">
        <span id="confirmMsg" class="confirm-msg"></span>
        <div class="panel-row confirm-actions">
          <button id="confirmDl" class="btn primary">Download</button>
          <button id="confirmCancel" class="btn">Cancel</button>
        </div>
      </div>

      <div class="panel-row dl-row" id="dlRow" style="display: none">
        <div class="dl-info">
          <span id="dlLabel">Downloading…</span>
          <div class="dl-bar"><div id="dlFill"></div></div>
        </div>
        <button id="stopDl" class="btn">Stop</button>
      </div>

      <div class="panel-row hotkey-row">
        <select id="quality" title="Model size · VRAM shown is for full-GPU (optimal) performance — smaller runs on lower-end GPUs"></select>
        <button id="hotkey" class="btn hk-btn" title="Read-aloud hotkey — click, then press a shortcut">…</button>
      </div>
    </section>
    <script type="module" src="/src/panel.js"></script>
  </body>
</html>
